<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>緊急石井速報</title>
    <style>
        body { margin: 0; padding: 0; height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center; font-family: sans-serif; background-color: #000; }
        
        /* 背景動画の設定 */
        #bg-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; display: none; }
        
        /* 初期画面のボタン */
        #start-btn { padding: 20px 40px; font-size: 1.5rem; background: red; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        
        /* 警告表示 */
        #alert-content { display: none; text-align: center; color: white; background: rgba(0,0,0,0.6); padding: 30px; border: 2px solid red; }
        h1 { font-size: 2.5rem; margin-top: 0; color: #ff0000; }
        #message { font-size: 1.2rem; line-height: 1.6; }
    </style>
</head>
<body>

    <button id="start-btn" onclick="startEmergency()">石井速報を起動</button>

    <video id="bg-video" loop muted playsinline>
        <source src="36877_1280x720.mp4" type="video/mp4">
    </video>

    <div id="alert-content">
        <h1>緊急石井速報</h1>
        <p id="message"></p>
    </div>

    <script>
        function startEmergency() {
            // メッセージリスト
            const messages = [
                "【不快警報】石井が何か食べようとしています。食べ方が汚いので、視界に入れないようにしてください。",
                "【不快警報】石井が何か食べています。くちゃくちゃという音に注意してください。",
                "【警告】石井はあなたの話を聞く気がありません。話すことを速やかにやめましょう。",
                "【警告】石井がつまらない話を始めました。聞き流す準備を始めてください。",
                "【意味不明】質問の答えが返ってきません。質問するだけ無駄です。あきらめましょう。",
                "【接近警報】石井は普通に面倒くさいので、なるべく関わらないようにしてください。",
                "【災害警報】石井に対して都合が悪い質問をしたようです。二次災害につながるので速やかに避難しましょう。",
                "【爆音警報】石井が話し始めました。突然の声量による不快指数上昇に注意してください。"
            ];

            // ランダムに選出
            const randomMsg = messages[Math.floor(Math.random() * messages.length)];
            document.getElementById('message').innerHTML = randomMsg;

            // 動画再生
            const video = document.getElementById('bg-video');
            video.style.display = 'block';
            video.play();

            // 音声再生
            const audio = new Audio('alert-sound.mp3');
            audio.play();

            // 振動
            if (navigator.vibrate) {
                navigator.vibrate([1000, 500, 1000, 500, 1000, 500]);
            }

            // 表示切替
            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('alert-content').style.display = 'block';
        }
    </script>
</body>
</html>
